# Experiment 2 — Model A: Random latent noise baseline
experiment_name: "exp2_model_a"
description: "Video-based baseline with random latent noise corruptions"

env:
  grid_size: 8
  max_objects: 5

training:
  batch_size: 16
  learning_rate: 0.0001
  num_epochs: 100
  horizon: 25
  seed: 42

encoder:
  frame_size: 64
  num_slots: 6
  slot_dim: 64
  slot_iters: 3

tamg:
  num_operators: 0  # disabled — random noise instead
  num_validators: 0

use_tensorboard: true
